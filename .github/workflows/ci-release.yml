name: CI Release

# Runs after build.yml completes on main branch push (for releases)
# Also runs on pull_request to check VERSION bump permissions
on:
  workflow_run:
    workflows: ["CI Build"]
    types: [completed]
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  pre-checks:
    name: pre-checks (version, permission)
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.changes.outputs.version_changed }}
      proceed: ${{ steps.checks.outputs.proceed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Check if from build.yml workflow
        id: checks
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Detect VERSION change
        id: changes
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set -euo pipefail

          before="${{ github.event.before }}"
          head="${{ github.sha }}"

          if [ "$before" = "0000000000000000000000000000000000000000" ] || [ "$before" = "$head" ]; then
            changed=""
          else
            changed="$(git diff --name-only "$before" "$head" || true)"
          fi

          version_changed=false
          if echo "$changed" | grep -q '^VERSION$'; then
            version_changed=true
          fi

          echo "version_changed=$version_changed" >> "$GITHUB_OUTPUT"

      - name: Enforce patch bump permission (direct main push)
        if: steps.changes.outputs.version_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          user="${{ github.actor }}"
          perm="$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/collaborators/$user/permission" \
            | jq -r '.permission')"
          case "$perm" in
            admin|maintain|write) echo "OK: $user has $perm access";;
            *) echo "VERSION bumps on main require write access; $user has permission: $perm"; exit 1 ;;
          esac

      - name: Auto bump build version
        if: github.event_name != 'pull_request' && steps.changes.outputs.version_changed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python -m pip install --upgrade pip
          python -m pip install bumpver
          make bump BUMP_TYPE=build
          if git diff --quiet HEAD -- Cargo.lock; then
            echo "Cargo.lock unchanged — not amending"
          else
            git add Cargo.lock
            git commit --amend --no-edit
          fi
          git push origin main

  release:
    name: GitHub Release & Crates.io Publish
    runs-on: ubuntu-latest
    needs: [pre-checks]
    if: needs.pre-checks.outputs.version_changed == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Download artifacts from build.yml
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f VERSION ]; then
            echo "ERROR: VERSION file not found"
            exit 1
          fi
          VERSION=$(cat VERSION)
          if [ -z "$VERSION" ]; then
            echo "ERROR: VERSION file is empty"
            exit 1
          fi
          tag="v${VERSION}"

          if [ ! -d dist ] || [ -z "$(ls -A dist/ 2>/dev/null)" ]; then
            echo "ERROR: dist/ directory empty or missing"
            exit 1
          fi

          git fetch --tags --force
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q "$tag"; then
            echo "Tag already exists: $tag — skipping"
          else
            git tag -a "$tag" -m "$tag"
            git push origin "$tag"
          fi

          pip install --quiet git-cliff
          if git-cliff --current --output /tmp/cliff_notes.md 2>&1; then
            echo "Generated changelog via git-cliff for current tag"
          else
            echo "WARNING: git-cliff failed — using basic release notes"
            echo "Release $tag" > /tmp/cliff_notes.md
          fi

          gh release create "$tag" dist/* --title "$tag" --notes-file /tmp/cliff_notes.md

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Cargo.lock
          git diff --cached --quiet || git commit -m "chore: update Cargo.lock"
          cargo publish
