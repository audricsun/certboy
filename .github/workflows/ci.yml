name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  pre-checks:
    name: pre-checks (version, permission)
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.changes.outputs.version_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Detect VERSION change
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            changed="$(git diff --name-only "$base" "$head" || true)"
            actor="${{ github.event.pull_request.user.login }}"
          else
            before="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [ "$before" = "0000000000000000000000000000000000000000" ] || [ "$before" = "$head" ]; then
              changed=""
            else
              changed="$(git diff --name-only "$before" "$head" || true)"
            fi
            actor="${{ github.actor }}"
          fi

          version_changed=false
          if echo "$changed" | grep -q '^VERSION$'; then
            version_changed=true
          fi

          echo "version_changed=$version_changed" >> "$GITHUB_OUTPUT"
          echo "actor=$actor" >> "$GITHUB_OUTPUT"

      - name: Enforce patch bump permission (PRs)
        if: github.event_name == 'pull_request' && steps.changes.outputs.version_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          user="${{ steps.changes.outputs.actor }}"
          perm="$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/collaborators/$user/permission" \
            | jq -r '.permission')"

          case "$perm" in
            admin|maintain|write) ;;
            *) echo "VERSION bumps require write access; $user has permission: $perm"; exit 1 ;;
          esac

      - name: Enforce patch bump permission (direct main push)
        if: github.event_name == 'push' && github.ref_name == 'main' && steps.changes.outputs.version_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          user="${{ github.actor }}"
          perm="$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/collaborators/$user/permission" \
            | jq -r '.permission')"
          case "$perm" in
            admin|maintain|write) ;;
            *) echo "VERSION bumps on main require write access; $user has permission: $perm"; exit 1 ;;
          esac

      - name: Auto bump build version (push to main only)
        if: github.event_name == 'push' && github.ref_name == 'main' && steps.changes.outputs.version_changed != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Ensure remote URL uses token for push (checkout sets this, but re-confirm after bump)
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}"
          python -m pip install --upgrade pip
          python -m pip install bumpver
          make bump BUMP_TYPE=build
          git push

      - name: Cancel this workflow run after push
        if: github.event_name == 'push' && github.ref_name == 'main'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          # Verify gh is available before using it
          if ! command -v gh >/dev/null 2>&1; then
            echo "gh not available — skipping explicit cancellation (concurrency group will handle)"
            exit 0
          fi
          echo "Pipeline push detected — cancelling this workflow run (${{ github.run_id }}) to allow the new pipeline (triggered by the push) to proceed."
          # Use GitHub REST API directly via curl as a fallback
          curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/cancel" \
            || echo "Cancellation may have already occurred via concurrency group — continuing."

  cargo-check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  cargo-fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check

  cargo-clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: make clippy

  cargo-test:
    name: tests (nextest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-nextest --locked || true
      - run: cargo install cargo-llvm-cov --locked || true
      - run: make test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts
          path: |
            target/nextest/ci/junit.xml
            target/llvm-cov-target/cobertura.xml
            target/html/

  e2e:
    name: e2e (quickstart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: chmod +x ./scripts/quickstart.sh
      - run: ./scripts/quickstart.sh

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    needs: [pre-checks]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-audit --locked || true
      - run: make audit

  build:
    name: build (release)
    runs-on: ubuntu-latest
    needs: [cargo-check, cargo-fmt, cargo-clippy, cargo-test, e2e]
    if: github.event_name == 'push' && github.ref_name == 'main' && needs.pre-checks.outputs.version_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_ENV"
      - run: cargo build --release --locked
      - run: mv target/release/certboy "certboy-${VERSION}-x86_64-unknown-linux-gnu"
      - uses: actions/upload-artifact@v4
        with:
          name: certboy-${{ env.VERSION }}-gnu
          path: certboy-${{ env.VERSION }}-x86_64-unknown-linux-gnu

  build-musl:
    name: build (x86_64-unknown-linux-musl)
    runs-on: ubuntu-latest
    needs: [cargo-check, cargo-fmt, cargo-clippy, cargo-test, e2e]
    if: github.event_name == 'push' && github.ref_name == 'main' && needs.pre-checks.outputs.version_changed == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: rustup target add x86_64-unknown-linux-musl
      - run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_ENV"
      - run: cargo build --release --locked --target x86_64-unknown-linux-musl
      - run: mv target/x86_64-unknown-linux-musl/release/certboy "certboy-${VERSION}-x86_64-unknown-linux-musl"
      - uses: actions/upload-artifact@v4
        with:
          name: certboy-${{ env.VERSION }}-musl
          path: certboy-${{ env.VERSION }}-x86_64-unknown-linux-musl

  release:
    name: GitHub Release & Crates.io Publish
    runs-on: ubuntu-latest
    needs: [pre-checks, build, build-musl]
    if: github.event_name == 'push' && github.ref_name == 'main' && needs.pre-checks.outputs.version_changed == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Tag and GitHub release
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(cat VERSION)
          tag="v${VERSION}"

          git fetch --tags --force
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q "$tag"; then
            echo "Tag already exists on origin: $tag"
            exit 1
          fi

          git tag -a "$tag" -m "$tag"
          git push origin "$tag"

          gh release create "$tag" dist/* --title "$tag" --notes "Release $tag"

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --locked