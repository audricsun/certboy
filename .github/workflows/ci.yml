name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: read

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Detect VERSION change
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            changed="$(git diff --name-only "$base" "$head" || true)"
            actor="${{ github.event.pull_request.user.login }}"
          else
            before="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [ "$before" = "0000000000000000000000000000000000000000" ]; then
              changed=""
            else
              changed="$(git diff --name-only "$before" "$head" || true)"
            fi
            actor="${{ github.actor }}"
          fi

          version_changed=false
          if echo "$changed" | grep -q '^VERSION$'; then
            version_changed=true
          fi

          echo "version_changed=$version_changed" >> "$GITHUB_OUTPUT"
          echo "actor=$actor" >> "$GITHUB_OUTPUT"

      - name: Enforce patch bump permission (PRs)
        if: github.event_name == 'pull_request' && steps.changes.outputs.version_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          user="${{ steps.changes.outputs.actor }}"
          perm="$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/collaborators/$user/permission" \
            | jq -r '.permission')"

          case "$perm" in
            admin|maintain|write) ;;
            *) echo "VERSION bumps require write access; $user has permission: $perm"; exit 1 ;;
          esac

      - name: Auto bump build version (push to main only)
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') && steps.changes.outputs.version_changed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          python -m pip install --upgrade pip
          python -m pip install bumpver
          make bump VERSION=build

      - name: Export version
        shell: bash
        run: echo "VERSION=$(cat VERSION)" >> "$GITHUB_ENV"

      - name: cargo fmt
        run: cargo fmt --check

      - name: clippy
        run: make clippy

      - name: cargo check
        run: cargo check --all-targets

      - name: tests (nextest + coverage)
        shell: bash
        run: |
          set -euo pipefail
          cargo install cargo-nextest --locked || true
          cargo install cargo-llvm-cov --locked || true
          make test

      - name: e2e (quickstart)
        shell: bash
        run: |
          set -euo pipefail
          chmod +x ./scripts/quickstart.sh
          ./scripts/quickstart.sh

      - name: audit
        run: make audit

      - name: Install musl tooling
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build artifacts
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        shell: bash
        run: |
          set -euo pipefail
          rm -rf dist
          mkdir -p dist

          make build
          cp target/release/certboy "dist/certboy-${VERSION}-x86_64-unknown-linux-gnu"

          make musl
          cp target/x86_64-unknown-linux-musl/release/certboy "dist/certboy-${VERSION}-x86_64-unknown-linux-musl"

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master')
        with:
          name: certboy-${{ env.VERSION }}
          path: dist/

      - name: Enforce release permission (pushes)
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') && steps.changes.outputs.version_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          user="${{ github.actor }}"
          perm="$(curl -fsSL \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/collaborators/$user/permission" \
            | jq -r '.permission')"

          case "$perm" in
            admin|maintain|write) ;;
            *) echo "Releases require write access; $user has permission: $perm"; exit 1 ;;
          esac

      - name: Tag and GitHub release
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') && steps.changes.outputs.version_changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          tag="v${VERSION}"

          git fetch --tags --force
          if git ls-remote --tags origin "refs/tags/$tag" | grep -q "$tag"; then
            echo "Tag already exists on origin: $tag"
            exit 1
          fi

          git tag -a "$tag" -m "$tag"
          git push origin "$tag"

          gh release create "$tag" dist/* --title "$tag" --notes "Release $tag"

      - name: Publish to crates.io
        if: github.event_name == 'push' && (github.ref_name == 'main' || github.ref_name == 'master') && steps.changes.outputs.version_changed == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: cargo publish --locked
