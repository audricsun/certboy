name: CI Tests

# Runs on every PR and on pushes to main — always runs all tests
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  cargo-check:
    name: cargo check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check --all-targets

  cargo-fmt:
    name: cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check

  cargo-clippy:
    name: cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: make clippy

  cargo-test:
    name: tests (nextest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache crates.io index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index
          key: crates-io-index-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: crates-io-index-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
      - run: make test
      - name: Code coverage summary
        uses: irongut/CodeCoverageSummary@v1
        with:
          filename: target/llvm-cov-target/cobertura.xml
          format: markdown
          badge: true
          fail_below_min: 70
          thresholds: '80'
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-artifacts
          path: |
            target/nextest/ci/junit.xml
            target/llvm-cov-target/cobertura.xml
            target/html/

  e2e:
    name: e2e (quickstart)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: chmod +x ./scripts/quickstart.sh
      - run: ./scripts/quickstart.sh

  audit:
    name: cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache crates.io index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry/index
          key: crates-io-index-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: crates-io-index-${{ runner.os }}-
      - uses: Swatinem/rust-cache@v2
      - run: make audit
