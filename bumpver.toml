[bumpver]
current_version = "2026.4.3"
version_pattern = "YYYY.MM.PATCH[-TAGNUM]"
commit_message = "bump version to {new_version}"
tag_message = "v{new_version}"
commit = true
tag = false
push = false

[bumpver.file_patterns]
"VERSION" = [
    "^{version}$",
]
"Cargo.toml" = [
    "^version = \"{version}\"$",
]
