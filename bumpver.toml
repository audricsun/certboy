[bumpver]
current_version = "2026.16.30"
version_pattern = "GGGG.VV.PATCH"
commit_message = "bump version to {new_version}"
tag_message = "v{new_version}"
commit = true
tag = false
push = false

[bumpver.file_patterns]
"VERSION" = [
    "^{version}$",
]
"Cargo.toml" = [
    "^version = \"{version}\"$",
]
