stages:
  - test
  - version
  - release

variables:
  CARGO_IMAGE: "rust:1.80"

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: "$CI_DEFAULT_BRANCH && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH"
    # - if: "$CI_COMMIT_TAG"

.cargo-check:
  stage: test
  image: ${CARGO_IMAGE}
  script:
    - cargo check --all-targets
    - if [ $? -ne 0 ]; then echo "Check failed"; exit 1; fi

.cargo-fmt:
  stage: test
  image: ${CARGO_IMAGE}
  script:
    - cargo fmt --check
    - if [ $? -ne 0 ]; then echo "Format check failed, run 'cargo fmt' to fix"; exit 1; fi

.cargo-test:
  stage: test
  image: ${CARGO_IMAGE}
  before_script:
    - cargo install cargo-nextest --locked || true
    - cargo install cargo-llvm-cov --locked || true
  script:
    - make test
  coverage: '/TOTAL\s+(\d+\s+)+(\d+\.\d+\%)/'
  artifacts:
    paths:
      - target/nextest/ci/junit.xml
      - target/llvm-cov-target/cobertura.xml
      - target/html/
    reports:
      junit: target/nextest/ci/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: target/llvm-cov-target/cobertura.xml
    expire_in: 1 week

.e2e-test:
  stage: test
  image: ${CARGO_IMAGE}
  script:
    - chmod +x ./scripts/quickstart.sh
    - ./scripts/quickstart.sh

cargo-check:
  extends: .cargo-check

cargo-fmt:
  extends: .cargo-fmt

cargo-test:
  extends: .cargo-test

e2e:
  extends: .e2e-test

build:
  stage: test
  image: ${CARGO_IMAGE}
  script:
    - VERSION=$(cat VERSION)
    - cargo build --release --locked
    - mv target/release/certboy certboy-${VERSION}
    - ls -alh || true
  artifacts:
    paths:
      - certboy-*
    expire_in: 1 week

build-musl:
  stage: test
  image: ${CARGO_IMAGE}
  script:
    - apt-get update && apt-get install -y musl-tools
    - rustup target add x86_64-unknown-linux-musl
    - VERSION=$(cat VERSION)
    - cargo build --release --locked --target x86_64-unknown-linux-musl
    - mv target/x86_64-unknown-linux-musl/release/certboy certboy-x86_64-unknown-linux-musl-${VERSION}
    - ls -alh || true
  artifacts:
    paths:
      - certboy-x86_64-unknown-linux-musl-*
    expire_in: 1 week

cargo-publish:
  stage: release
  image: ${CARGO_IMAGE}
  rules:
    - if: '$CI_COMMIT_BRANCH == "master" && $CI_PIPELINE_SOURCE != "merge_request_event"'
      when: on_success
    - when: never
  script:
    - test -n "$CARGO_REGISTRY_TOKEN" || (echo "CARGO_REGISTRY_TOKEN is not set" && exit 1)
    - cargo publish --locked
